<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Sign In - Predictive Maintenance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <div class="page-wrapper">
      <div class="page-overlay"></div>
      
      <div class="login-page-wrapper">
        <div class="login-card fade-up visible">
          <div class="login-header">
            <a class="brand" href="{{ url_for('index') }}">
              <span class="brand-icon"><span>P</span></span>
              <span class="brand-text"><strong>Predictive</strong><span>Maintenance</span></span>
            </a>
            <h2 class="mt-3">Welcome Back</h2>
            <p>Access the factory telemetry control panel</p>
          </div>

          {% if error %}
            <div class="login-error">
              <i class="fa-solid fa-triangle-exclamation"></i>
              <span>{{ error }}</span>
            </div>
          {% endif %}

          <form class="login-form" method="POST" action="{{ url_for('login') }}">
            <div class="login-input-group">
              <label for="username">Username</label>
              <div class="login-input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" name="username" required placeholder="admin" autocomplete="username">
              </div>
            </div>

            <div class="login-input-group">
              <label for="password">Password</label>
              <div class="login-input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
              </div>
            </div>

            <button type="submit" class="login-btn">
              <span>Sign In</span>
              <i class="fa-solid fa-arrow-right"></i>
            </button>
          </form>

          <div class="login-hint">
            <i class="fa-solid fa-circle-info"></i>&nbsp; Use mock credentials <code>admin</code> / <code>admin</code> to sign in.
          </div>

          <div class="login-back-link">
            <a href="{{ url_for('index') }}"><i class="fa-solid fa-arrow-left"></i> Back to Homepage</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
